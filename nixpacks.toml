[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate",
  "pip install --upgrade pip",
  "pip install -r requirements.txt"
]

[phases.build]
cmds = ["echo Build complete"]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:3000 --workers 1 --threads 2"
