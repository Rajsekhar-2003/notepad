<!-- templates/404.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Not Found - Web Notepad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        .error-card { background: white; border-radius: 24px; padding: 40px; text-align: center; max-width: 500px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    </style>
</head>
<body>
    <div class="error-card">
        <i class="bi bi-file-text" style="font-size: 64px; color: #667eea;"></i>
        <h1 class="mt-3">Note Not Found</h1>
        <p class="text-muted">{{ message if message else 'This shared note does not exist or has expired.' }}</p>
        <a href="/" class="btn btn-primary">Create New Note</a>
    </div>
</body>
</html>
